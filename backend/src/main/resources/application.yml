# Purpose: Main backend configuration file for database, server, and JWT settings.

server:
  port: ${PORT:8081}

spring:
  application:
    name: ticketbook
  h2:
    console:
      enabled: ${SPRING_H2_CONSOLE_ENABLED:true}
      path: /h2-console
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/ticketbook;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:false}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}
  jwt:
    # Purpose: Replace this value before production.
    secret: ${APP_JWT_SECRET:change-this-development-secret-key-please-replace}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}
  seed:
    demo-users: ${APP_SEED_DEMO_USERS:false}
    admin:
      email: ${APP_SEED_ADMIN_EMAIL:}
      password: ${APP_SEED_ADMIN_PASSWORD:}
      name: ${APP_SEED_ADMIN_NAME:Tithu Admin}
    user:
      email: ${APP_SEED_USER_EMAIL:user@tithu.com}
      password: ${APP_SEED_USER_PASSWORD:user123}
      name: ${APP_SEED_USER_NAME:Demo User}
