services:
  - type: web
    name: tithu-backend
    env: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/movies
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: SPRING_DATASOURCE_DRIVER_CLASS_NAME
        value: org.postgresql.Driver
      - key: SPRING_H2_CONSOLE_ENABLED
        value: false
      - key: SPRING_FLYWAY_ENABLED
        value: true
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: validate
      - key: APP_JWT_SECRET
        sync: false
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
      - key: APP_SEED_ADMIN_EMAIL
        sync: false
      - key: APP_SEED_ADMIN_PASSWORD
        sync: false
